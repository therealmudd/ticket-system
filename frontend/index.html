<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" defer></script>
  </head>
  <body class="bg-gray-100 text-gray-900">
    <!-- Navigation Tabs -->
    <nav class="fixed top-0 left-0 right-0 bg-white shadow z-10">
      <div class="flex justify-around py-3">
        <button class="tab-btn text-indigo-600 font-semibold">➕ Create</button>
        <button class="tab-btn">📷 Scan</button>
        <button class="tab-btn">🎟️ Tickets</button>
      </div>
    </nav>

    <div class="pt-20 px-4 space-y-8 max-w-md mx-auto">
      <!-- Create Ticket Page -->
      <section class="tab-content block">
        <div class="bg-white rounded-xl p-6 shadow">
          <h2 class="text-lg font-semibold mb-4">➕ Create Ticket</h2>
          <p class="active-event text-sm text-gray-600 mb-4"></p>
          <form id="ticketForm" class="space-y-4">
            <label class="block text-sm font-medium">Full Name</label>
            <input
              type="text"
              name="name"
              placeholder="Attendee's full name"
              class="w-full p-2 border rounded-md"
              required
            />

            <label class="block text-sm font-medium">Email</label>
            <input
              type="email"
              name="email"
              placeholder="email@example.com"
              class="w-full p-2 border rounded-md"
              required
            />

            <label class="block text-sm font-medium">Number of Tickets</label>
            <input
              type="number"
              name="quantity"
              min="1"
              max="10"
              value="1"
              id="ticketQuantity"
              class="w-full p-2 border rounded-md"
              required
            />

            <button
              type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-md hover:bg-indigo-700"
            >
              🎟️ Issue Ticket
            </button>
          </form>
        </div>
      </section>

      <!-- Scan Ticket Page -->
      <section class="tab-content hidden">
        <div class="bg-white rounded-xl p-6 shadow text-center">
          <h2 class="text-lg font-semibold mb-4">📷 Scan Ticket</h2>
          <p class="active-event text-sm text-gray-600 mb-4"></p>
          <p class="text-sm mb-4">
            Allow camera access to scan a ticket QR code or enter the reference
            number manually.
          </p>

          <div id="reader" class="bg-indigo-100 p-2 rounded-lg mb-4"></div>

          <input
            type="text"
            id="manualReference"
            placeholder="# e.g. TKT01010001001"
            class="w-full p-2 mb-4 border rounded-md"
          />

          <button
            id="manualCheckinBtn"
            class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-md hover:bg-indigo-700"
          >
            ✅ Check Ticket
          </button>

          <div id="checkinStatus" class="mt-2 text-sm text-gray-600"></div>
        </div>
      </section>

      <!-- Tickets List Page -->
      <section class="tab-content hidden">
        <div class="bg-white rounded-xl p-6 shadow">
          <p class="active-event text-sm text-gray-600 mb-4"></p>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">🎟️ Tickets Sold (<span id="numTicketsSold">0</span>)</h2>
            <span class="text-gray-600 text-sm"> | </span>
            <span class="text-gray-600 text-sm">Tickets Redeemed: <span id="numTicketsRedeemed">0</span></span>
            <button class="text-indigo-600 text-sm font-semibold">
              🔍 Filter
            </button>
          </div>

          <input
            type="text"
            placeholder="Search by name, email..."
            class="w-full p-2 mb-4 border rounded-md"
          />

          <!-- Ticket Items -->
          <ul id="ticketList" class="space-y-3">
            <!-- Will be dynamically filled -->
          </ul>
        </div>
      </section>
    </div>

    <script>
      const tabs = document.querySelectorAll(".tab-btn");
      const contents = document.querySelectorAll(".tab-content");
      const tabNames = ["create", "scan", "tickets"];

      function showTab(index) {
        tabs.forEach((tab, i) => {
          tab.classList.toggle("text-indigo-600", i === index);
          tab.classList.toggle("font-semibold", i === index);
          contents[i].classList.toggle("hidden", i !== index);
        });
        history.pushState(null, "", `#${tabNames[index]}`);
      }

      tabs.forEach((btn, index) => {
        btn.addEventListener("click", () => showTab(index));
      });

      function initTabFromHash() {
        const hash = window.location.hash.substring(1);
        const index = tabNames.indexOf(hash);
        if (index !== -1) showTab(index);
        else showTab(0);
      }

      window.addEventListener("popstate", initTabFromHash);
      window.addEventListener("DOMContentLoaded", initTabFromHash);

      async function loadConfig() {
        try {
          const response = await fetch("/config");
          const config = await parseResponse(response);
          const eventLabel = `${config.event_name} (${config.event_id})`;

          document.querySelectorAll(".active-event").forEach((element) => {
            element.textContent = `Active event: ${eventLabel}`;
          });

          const quantityInput = document.getElementById("ticketQuantity");
          if (quantityInput) {
            quantityInput.max = config.max_tickets_per_request;
          }
        } catch (error) {
          console.error("Config load error:", error);
        }
      }

      // Show alert message
      function showAlert(message, success = true, container, linkUrl = null) {
        const alert = document.createElement("div");
        alert.className = `text-sm p-2 rounded mb-2 ${
          success ? "bg-green-100 text-green-800" : "bg-red-100 text-red-800"
        }`;
        alert.textContent = message;
        if (linkUrl) {
          const link = document.createElement("a");
          link.href = linkUrl;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "block mt-1 underline font-semibold";
          link.textContent = "Open email preview";
          alert.appendChild(link);
        }
        container.prepend(alert);
        setTimeout(() => alert.remove(), 4000);
      }

      async function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }

        const text = await response.text();
        const firstLine = text.replace(/\s+/g, " ").slice(0, 120);
        throw new Error(
          `Server returned ${response.status} ${response.statusText}: ${firstLine}`
        );
      }

      async function updateTicketStatus(reference, status) {
        const response = await fetch(`/tickets/${encodeURIComponent(reference)}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status }),
        });
        const data = await parseResponse(response);
        if (!response.ok) {
          throw new Error(data.error || "Failed to update ticket.");
        }
        return data;
      }

      async function deleteTicket(reference) {
        const response = await fetch(`/tickets/${encodeURIComponent(reference)}`, {
          method: "DELETE",
        });
        const data = await parseResponse(response);
        if (!response.ok) {
          throw new Error(data.error || "Failed to delete ticket.");
        }
        return data;
      }

      function ticketStatusOptions(currentStatus) {
        const statuses = ["sold", "redeemed", "cancelled", "void"];
        return statuses
          .map(
            (status) =>
              `<option value="${status}" ${
                status === currentStatus ? "selected" : ""
              }>${status}</option>`
          )
          .join("");
      }

      function ticketStatusBadge(status) {
        const badges = {
          sold: {
            label: "Sold",
            icon: "●",
            classes: "bg-blue-100 text-blue-800 border-blue-200",
          },
          redeemed: {
            label: "Redeemed",
            icon: "✓",
            classes: "bg-green-100 text-green-800 border-green-200",
          },
          cancelled: {
            label: "Cancelled",
            icon: "!",
            classes: "bg-amber-100 text-amber-800 border-amber-200",
          },
          void: {
            label: "Void",
            icon: "×",
            classes: "bg-red-100 text-red-800 border-red-200",
          },
        };
        const badge = badges[status] || {
          label: status || "Unknown",
          icon: "?",
          classes: "bg-gray-100 text-gray-800 border-gray-200",
        };

        return `
          <span class="inline-flex items-center gap-1 border rounded-full px-2 py-1 text-xs font-semibold ${badge.classes}">
            <span>${badge.icon}</span>
            <span>${badge.label}</span>
          </span>
        `;
      }

      // Form submission with spinner and alert
      document
        .getElementById("ticketForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const form = e.target;
          const formData = new FormData(form);
          const formContainer = form.closest(".tab-content");

          const submitButton = form.querySelector('button[type="submit"]');
          const originalText = submitButton.innerHTML;

          const spinner = document.createElement("span");
          spinner.classList.add(
            "animate-spin",
            "h-5",
            "w-5",
            "border-4",
            "border-white",
            "border-t-transparent",
            "rounded-full",
            "inline-block",
            "ml-2",
            "align-middle"
          );

          submitButton.disabled = true;
          submitButton.style.cursor = "not-allowed";
          submitButton.innerHTML = "Creating...";
          submitButton.appendChild(spinner);

          try {
            const response = await fetch("/create_ticket", {
              method: "POST",
              body: formData,
            });

            const data = await parseResponse(response);
            if (!response.ok) {
              throw new Error(data.error || "Failed to create tickets.");
            }

            console.log("Create Ticket Response:", data);
            const references = data.references || [];
            const ticketWord = references.length === 1 ? "Ticket" : "Tickets";
            showAlert(
              `${ticketWord} created: ${references.join(", ")}`,
              true,
              formContainer,
              data.email_preview_url
            );
            if (data.email_preview_url) {
              window.open(data.email_preview_url, "_blank", "noopener,noreferrer");
            }
            form.reset();
            loadTickets();
          } catch (error) {
            console.error("Create Ticket Error:", error);
            showAlert(error.message, false, formContainer);
          } finally {
            submitButton.disabled = false;
            submitButton.style.cursor = "pointer";
            submitButton.innerHTML = originalText;
          }
        });

      // Manual check-in
      document
        .getElementById("manualCheckinBtn")
        .addEventListener("click", async () => {
          const ref = document.getElementById("manualReference").value;
          const statusDiv = document.getElementById("checkinStatus");

          if (!ref.trim()) {
            statusDiv.textContent = "Please enter a reference number.";
            return;
          }

          try {
            const res = await fetch(
              `/redeem-ticket/${encodeURIComponent(ref.trim())}`
            );
            const data = await res.json();
            statusDiv.textContent = data.result;
          } catch (error) {
            console.error("Redeem error:", error);
            statusDiv.textContent = "Error connecting to server.";
          }
        });

      // QR Scanner with alert
      window.addEventListener("DOMContentLoaded", () => {
        loadConfig();

        const reader = document.getElementById("reader");
        if (reader) {
          const qrScanner = new Html5QrcodeScanner("reader", {
            fps: 10,
            qrbox: 250,
          });
          let qrHasScanned = false; // flag to prevent multiple scans

          qrScanner.render(async (qrCodeMessage, _) => {
            if (qrHasScanned) return;
            qrHasScanned = true;

            document.getElementById("manualReference").value = qrCodeMessage;

            try {
              const res = await fetch(
                `/redeem-ticket/${encodeURIComponent(qrCodeMessage)}`
              );
              const data = await res.json();

              const scanContainer = document.querySelectorAll(".tab-content")[1];
              showAlert(
                `📷 ${data.result}`,
                data.result === "ticket redeemed",
                scanContainer
              );

              loadTickets();
            } catch (error) {
              console.error("QR redeem error:", error);
            }

            // Optional: reset scanner after 3 seconds if you want to scan again
            setTimeout(() => {
              qrHasScanned = false;
            }, 3000);
          });
        }

        loadTickets();
      });

      // Load and filter tickets
      function loadTickets() {
        const ticketList = document.getElementById("ticketList");
        if (!ticketList) return;
        ticketList.innerHTML = "";

        const loadingMessage = document.createElement("p");
        loadingMessage.textContent = "Loading tickets...";
        loadingMessage.className = "text-center text-gray-500";
        ticketList.appendChild(loadingMessage);

        fetch("/tickets")
          .then((res) => res.json())
          .then((tickets) => {
            ticketList.removeChild(loadingMessage);
            // tickets.sort((a, b) => b[0].localeCompare(a[0]));
            const numTicketsSold = document.getElementById("numTicketsSold");
            numTicketsSold.textContent = tickets.filter((ticket) => !ticket[4]).length;
            const numTicketsRedeemed = document.getElementById("numTicketsRedeemed");
            numTicketsRedeemed.textContent = tickets.filter((ticket) => ticket[3] === "redeemed").length;

            tickets.forEach((ticket) => {
              const li = document.createElement("li");
              li.className = "p-3 border rounded-md space-y-3";
              li.dataset.reference = ticket[0];
              li.innerHTML = `
                <div class="flex justify-between gap-3">
                  <div>
                    <p class="font-semibold">#${ticket[0]} – ${ticket[1]}</p>
                    <p class="text-sm text-gray-600">${ticket[2]}</p>
                    <p class="text-xs text-gray-500">Event: ${ticket[5]}</p>
                  </div>
                  <div class="flex items-start gap-2">
                    ${ticketStatusBadge(ticket[3])}
                    <button
                      type="button"
                      class="edit-ticket h-9 w-9 border rounded-md text-gray-600 hover:bg-gray-100"
                      title="Edit ticket"
                      aria-label="Edit ticket"
                    >
                      ✎
                    </button>
                  </div>
                </div>
                <div class="ticket-actions hidden grid grid-cols-[1fr_auto_auto] gap-2 items-center">
                  <select class="ticket-status w-full p-2 border rounded-md text-sm">
                    ${ticketStatusOptions(ticket[3])}
                  </select>
                  <button
                    type="button"
                    class="save-ticket-status bg-indigo-600 text-white text-sm font-semibold px-3 py-2 rounded-md hover:bg-indigo-700"
                  >
                    Save
                  </button>
                  <button
                    type="button"
                    class="delete-ticket bg-red-600 text-white text-sm font-semibold px-3 py-2 rounded-md hover:bg-red-700"
                  >
                    Delete
                  </button>
                </div>
              `;
              ticketList.appendChild(li);
            });
            setupTicketActions();
            setupSearchFilter();
          })
          .catch((err) => {
            console.error("Error fetching tickets:", err);
            ticketList.removeChild(loadingMessage);
          });
      }

      function setupSearchFilter() {
        const searchInput = document.querySelector(
          'input[placeholder*="Search"]'
        );
        const ticketList = document.getElementById("ticketList");

        if (searchInput) {
          searchInput.oninput = () => {
            const query = searchInput.value.toLowerCase();
            const items = ticketList.querySelectorAll("li");
            items.forEach((item) => {
              const text = item.textContent.toLowerCase();
              item.style.display = text.includes(query) ? "" : "none";
            });
          };
        }
      }

      function setupTicketActions() {
        const ticketList = document.getElementById("ticketList");
        const ticketsContainer = document.querySelectorAll(".tab-content")[2];

        ticketList.querySelectorAll(".edit-ticket").forEach((button) => {
          button.addEventListener("click", () => {
            const item = button.closest("li");
            const actions = item.querySelector(".ticket-actions");
            const isEditing = actions.classList.toggle("hidden") === false;

            button.classList.toggle("bg-indigo-100", isEditing);
            button.classList.toggle("text-indigo-700", isEditing);
            button.setAttribute(
              "aria-label",
              isEditing ? "Close ticket editor" : "Edit ticket"
            );
            button.setAttribute(
              "title",
              isEditing ? "Close ticket editor" : "Edit ticket"
            );
          });
        });

        ticketList.querySelectorAll(".save-ticket-status").forEach((button) => {
          button.addEventListener("click", async () => {
            const item = button.closest("li");
            const reference = item.dataset.reference;
            const status = item.querySelector(".ticket-status").value;
            const originalText = button.textContent;

            button.disabled = true;
            button.textContent = "Saving...";
            try {
              await updateTicketStatus(reference, status);
              showAlert(`Updated ${reference} to ${status}.`, true, ticketsContainer);
              loadTickets();
            } catch (error) {
              console.error("Ticket update error:", error);
              showAlert(error.message, false, ticketsContainer);
            } finally {
              button.disabled = false;
              button.textContent = originalText;
            }
          });
        });

        ticketList.querySelectorAll(".delete-ticket").forEach((button) => {
          button.addEventListener("click", async () => {
            const item = button.closest("li");
            const reference = item.dataset.reference;
            const confirmed = window.confirm(`Delete ticket ${reference}?`);
            if (!confirmed) return;

            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = "Deleting...";
            try {
              await deleteTicket(reference);
              showAlert(`Deleted ${reference}.`, true, ticketsContainer);
              loadTickets();
            } catch (error) {
              console.error("Ticket delete error:", error);
              showAlert(error.message, false, ticketsContainer);
            } finally {
              button.disabled = false;
              button.textContent = originalText;
            }
          });
        });
      }
    </script>
  </body>
</html>
